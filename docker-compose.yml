services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-podcastpack}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    # Single image for both `app` and `worker` so `docker compose build app`
    # rebuilds both — otherwise it's easy to upgrade a dependency, restart
    # only one service, and have the two diverge silently (lost half a debug
    # session to this on Day 6: openai pin updated in app, worker still on
    # the old version, Whisper crashed only in the worker).
    build: .
    image: podcast-pack:latest
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    image: podcast-pack:latest
    # -Q must list every queue our tasks dispatch to. Pipeline tasks
    # (start_job/transcribe/analyze/orchestrate/package) go to "default"
    # (settings.CELERY_TASK_DEFAULT_QUEUE); artifact workers explicitly
    # set queue= in apply_async. Without -Q the worker only consumes
    # "celery" and everything else sits on the broker forever.
    command: celery -A core worker --loglevel=info --concurrency=4 -Q default,video,text_artifacts,graphics
    environment:
      # `manage.py` adds src/ to sys.path, but celery boots without it,
      # so `-A core` can't import the celery app. Set PYTHONPATH explicitly.
      - PYTHONPATH=/app/src
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app
      - media:/app/media
    depends_on:
      - db
      - redis
      - app  # ensures the shared image is built before worker boots

volumes:
  pgdata:
  media:

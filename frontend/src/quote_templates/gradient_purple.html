<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .circle {
      position: absolute;
      bottom: -120px;
      right: -120px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.18);
    }
    .dot {
      position: absolute;
      top: 60px;
      right: 80px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #7c3aed;
    }
    .quote {
      color: #ffffff;
      font-size: {{FONT_SIZE}}px;
      line-height: 1.3;
      font-weight: 700;
      word-break: break-word;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }
    .author {
      color: #c4b5fd;
      font-size: 28px;
      margin-top: 48px;
      font-weight: 400;
      position: relative;
      z-index: 1;
    }
    .brand {
      position: absolute;
      bottom: 48px;
      left: 80px;
      color: rgba(167, 139, 250, 0.5);
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="circle"></div>
  <div class="dot"></div>
  <div class="quote">&#8220;{{QUOTE}}&#8221;</div>
  <div class="author">&#8212; {{SPEAKER}}</div>
  <div class="brand">{{PODCAST_NAME}}</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .accent {
      position: absolute;
      top: 0;
      left: 80px;
      width: 80px;
      height: 4px;
      background: #6366f1;
    }
    .quote {
      color: #ffffff;
      font-size: {{FONT_SIZE}}px;
      line-height: 1.3;
      font-weight: 600;
      word-break: break-word;
      letter-spacing: -0.02em;
    }
    .author {
      color: #888888;
      font-size: 28px;
      margin-top: 48px;
      font-weight: 400;
    }
    .brand {
      position: absolute;
      bottom: 48px;
      left: 80px;
      color: #444444;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="accent"></div>
  <div class="quote">&#8220;{{QUOTE}}&#8221;</div>
  <div class="author">&#8212; {{SPEAKER}}</div>
  <div class="brand">{{PODCAST_NAME}}</div>
</body>
</html>
